<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тестовый сайт</title>

    <!-- Microsoft Clarity -->
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "wkvfuh6oay");
    </script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        header {
            background: #111827;
            padding: 20px;
            text-align: center;
            font-size: 24px;
        }

        .container {
            text-align: center;
            padding: 100px 20px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 20px;
        }

        p {
            color: #cbd5f5;
        }

        .buttons {
            margin-top: 30px;
        }

        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .buy {
            background: #22c55e;
            color: white;
        }

        .buy:hover {
            background: #16a34a;
        }

        .info {
            background: #3b82f6;
            color: white;
        }

        .info:hover {
            background: #2563eb;
        }

        .section {
            padding: 100px 20px;
            text-align: center;
        }

        .section:nth-child(even) {
            background: #111827;
        }

        footer {
            padding: 50px;
            text-align: center;
            color: gray;
        }
    </style>
</head>
<body>

<header>
    🚀 Тестовый сайт для юзабилити
</header>

<div class="container">
    <h1>Добро пожаловать</h1>
    <p>Попробуйте взаимодействовать с сайтом</p>

    <div class="buttons">
        <button class="buy">Купить</button>
        <button class="info">Подробнее</button>
    </div>
</div>

<div class="section">
    <h2>О продукте</h2>
    <p>Описание продукта, преимущества и особенности.</p>
</div>

<div class="section">
    <h2>Почему выбирают нас</h2>
    <p>Качество, надежность и удобство использования.</p>
</div>

<div class="section">
    <h2>Отзывы</h2>
    <p>Пользователи довольны сервисом.</p>
</div>

<footer>
    ⬇ Нижняя часть сайта (редко используется)
</footer>

</body>
</html>
